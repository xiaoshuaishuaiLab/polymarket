server:
  port: 8080

spring:
  application:
    name: polymarket-bot
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/polymarket?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PolymarketHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.shuai.polymarket.bot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

polymarket:
  gamma:
    api-url: https://gamma-api.polymarket.com
  ws:
    url: wss://ws-subscriptions-clob.polymarket.com/ws/market
    shard-max-size: 50
    reconnect-initial-delay: 1000
    reconnect-max-delay: 30000
    ping-interval: 10000